<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" fill="none">
  <defs>
    <linearGradient id="robotGrad" x1="60" y1="0" x2="60" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B85D0"/>
      <stop offset="100%" stop-color="#00D4B4"/>
    </linearGradient>
  </defs>

  <!-- Halo -->
  <ellipse cx="60" cy="12" rx="22" ry="6" stroke="url(#robotGrad)" stroke-width="3.5" fill="none"/>

  <!-- Head -->
  <circle cx="60" cy="44" r="30" stroke="url(#robotGrad)" stroke-width="3.5" fill="none"/>

  <!-- Left eye -->
  <circle cx="48" cy="40" r="6" stroke="url(#robotGrad)" stroke-width="3" fill="none"/>

  <!-- Right eye -->
  <circle cx="72" cy="40" r="6" stroke="url(#robotGrad)" stroke-width="3" fill="none"/>

  <!-- Smile -->
  <path d="M 44 56 Q 60 68 76 56" stroke="url(#robotGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Left arm -->
  <line x1="30" y1="48" x2="10" y2="68" stroke="url(#robotGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left hand -->
  <circle cx="7" cy="72" r="8" stroke="url(#robotGrad)" stroke-width="3" fill="none"/>

  <!-- Right arm -->
  <line x1="90" y1="48" x2="110" y2="68" stroke="url(#robotGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right hand -->
  <circle cx="113" cy="72" r="8" stroke="url(#robotGrad)" stroke-width="3" fill="none"/>

  <!-- Chat bubble pointer -->
  <path d="M 52 93 L 48 82 L 68 93" stroke="url(#robotGrad)" stroke-width="3" fill="none" stroke-linejoin="round"/>

  <!-- Chat bubble body -->
  <rect x="18" y="93" width="84" height="46" rx="23" stroke="url(#robotGrad)" stroke-width="3.5" fill="none"/>

  <!-- Chat dots -->
  <circle cx="38" cy="116" r="5" stroke="url(#robotGrad)" stroke-width="3" fill="none"/>
  <circle cx="60" cy="116" r="5" stroke="url(#robotGrad)" stroke-width="3" fill="none"/>
  <circle cx="82" cy="116" r="5" stroke="url(#robotGrad)" stroke-width="3" fill="none"/>
</svg>
